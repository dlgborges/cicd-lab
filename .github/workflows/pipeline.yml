name: CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout código
              uses: actions/checkout@v3

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'

            - name: Instalar dependências
              run: pip install -r requirements.txt
            
            - name: Rodar teste simples
              run: python -c "print('Test passed')"
            
            - name: Build Docker image
              run: docker build -t cicd-lab:${{ github.sha }} .
    
            - name: Simular Deploy
              run: |
                echo "Deploying version ${{ github.sha}}"
                mkdir -p deploy
                echo "${{ github.sha }}" > deploy/version.txt
            
            - name: Simular Rollback
              if: failure()
              run: echo "Rollback triggered"