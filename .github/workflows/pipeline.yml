name: CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    ci:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-python@v4
          with:
            python-version: '3.11'
        - run: pip install -r requirements.txt
        - run: python -c "print('Test passed')"
    
    build:
      needs: ci
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        - run: docker build -t cicd-lab:${{ github.sha }} .
