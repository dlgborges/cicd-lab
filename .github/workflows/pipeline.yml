name: CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    ci:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-python@v4
          with:
            python-version: '3.11'
        - run: pip install -r requirements.txt
        - run: python -c "print('Test passed')"
    
    build:
      needs: ci
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        - run: docker build -t cicd-lab:${{ github.sha }} .
    
    terraform-plan:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            role-to-assume: arn:aws:iam::542525596293:role/terraform-execution-role
            aws-region: us-east-1

        - uses: actions/checkout@v3

        - name: List files (debug)
          run: ls -R

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
        
        - name: Terraform init
          run: terraform init
          working-directory: ./terraform
        
        - name: Save plan
          id: plan
          run: |
            terraform plan -detailed-exitcode -out=tfplan
          working-directory: ./terraform
          continue-on-error: true

        - name: Set exit code
          run: |
            echo "exitcode=${{ steps.plan.outcome == 'failure' && '2' || '0' }}"
            echo "exitcode=${{ steps.plan.outcome == 'failure' && '2' || '0' }}" >> $GITHUB_ENV
        
        - name: Upload plan
          uses: actions/upload-artifact@v4
          with:
            name: tfplan
            path: terraform/tfplan 

    terraform-apply:
      needs: terraform-plan
      runs-on: ubuntu-latest
      environment: prod
      
      steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            role-to-assume: arn:aws:iam::542525596293:role/terraform-execution-role
            aws-region: us-east-1

        - name: Check identity after credentials configuration
          run: aws sts get-caller-identity

        - uses: actions/checkout@v3

        - name: List files (debug)
          run: ls -R
        
        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3

        - name: Download plan
          uses: actions/download-artifact@v4
          with:
            name: tfplan
            path: terraform
        
        - name: Terraform init
          run: terraform init
          working-directory: ./terraform
        
        - name: Terraform apply
          run: terraform apply -auto-approve tfplan
          working-directory: ./terraform
        
        - name: Get EC2 IP
          id: terraform_output
          run: |
            cd terraform
            echo "EC2_IP=$(terraform output -raw public_ip)"
            echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

        - name: Setup SSH Key
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519

        - name: Update inventory
          run: |
            sed -i "s/EC2_IP_PLACEHOLDER/$EC2_IP/" ansible/inventory.ini
            cat ansible/inventory.ini

        - name: Setup Python venv for Ansible
          run: |
            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip
            pip install ansible-core==2.14.10
            pip install requests urllib3
        
        - name: Disable host key checking
          run: |
            echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
            cat ~/.ssh/config

        - name: Install Docker Ansible Collection
          run: |
            source .venv/bin/activate
            cd ansible && ansible-galaxy collection install community.docker

        - name: Run Ansible
          run: |
            source .venv/bin/activate
            ansible-playbook -i inventory.ini ./playbook.yml -vvv
